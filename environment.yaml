name: wearable-calibration-bayes
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11.15
  - pip=26.0.1
  # Notebook runtime — explicit so a fresh clone can open and run notebooks
  - jupyter=1.1.1
  - jupyterlab=4.5.6
  - ipykernel=7.2.0
  - notebook=7.5.5
  # Analysis stack
  - pandas=3.0.2
  - openpyxl=3.1.5
  - scipy=1.17.1
  - numpy=2.4.3
  - pymc=5.28.4
  - arviz=0.23.4
  - matplotlib=3.10.8
  - ezc3d=1.7.0
  - pyarrow=23.0.1
  - tabulate=0.10.0
  # Dev / repo tooling
  - pytest=9.0.3
  - nbstripout=0.9.1
